<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Asset Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: rgba(17, 24, 39, 0.7);
    --bg-card-hover: rgba(22, 33, 55, 0.85);
    --border: rgba(255, 255, 255, 0.06);
    --border-accent: rgba(99, 179, 237, 0.2);
    --text-primary: #f0f4f8;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-blue: #63b3ed;
    --accent-cyan: #22d3ee;
    --accent-gold: #fbbf24;
    --accent-emerald: #34d399;
    --accent-rose: #fb7185;
    --accent-violet: #a78bfa;
    --accent-orange: #fb923c;
    --positive: #34d399;
    --negative: #fb7185;
    --glow-blue: 0 0 30px rgba(99, 179, 237, 0.15);
    --glow-gold: 0 0 30px rgba(251, 191, 36, 0.15);
  }

  [data-theme="light"] {
    --bg-primary: #f5f7fa;
    --bg-secondary: #ffffff;
    --bg-card: rgba(255, 255, 255, 0.85);
    --bg-card-hover: rgba(240, 245, 255, 0.95);
    --border: rgba(0, 0, 0, 0.08);
    --border-accent: rgba(59, 130, 246, 0.25);
    --text-primary: #1a202c;
    --text-secondary: #4a5568;
    --text-muted: #718096;
    --accent-blue: #3b82f6;
    --accent-cyan: #0891b2;
    --accent-gold: #d97706;
    --accent-emerald: #059669;
    --accent-rose: #e11d48;
    --accent-violet: #7c3aed;
    --accent-orange: #ea580c;
    --positive: #059669;
    --negative: #e11d48;
    --glow-blue: 0 4px 20px rgba(59, 130, 246, 0.1);
    --glow-gold: 0 4px 20px rgba(217, 119, 6, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background effects */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(99, 179, 237, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(251, 191, 36, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(34, 211, 238, 0.02) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .noise-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .app {
    position: relative;
    z-index: 2;
    max-width: 1440px;
    margin: 0 auto;
    padding: 32px 40px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-mark {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: var(--bg-primary);
    box-shadow: var(--glow-blue);
  }

  .page-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .page-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: rgba(34, 211, 238, 0.08);
    border: 1px solid rgba(34, 211, 238, 0.2);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-cyan);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-cyan);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); }
    50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(34, 211, 238, 0); }
  }

  .last-updated {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
  }

  /* Price Chips (compact, next to Live badge) */
  .price-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    transition: all 0.3s ease;
  }

  .price-chip:hover {
    border-color: var(--border-accent);
    background: var(--bg-card-hover);
  }

  .price-chip-icon {
    font-size: 14px;
  }

  .price-chip-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .price-chip-value {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
  }

  /* Refresh Button */
  .refresh-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(12px);
  }

  .refresh-btn:hover {
    border-color: var(--accent-cyan);
    color: var(--accent-cyan);
    background: rgba(34, 211, 238, 0.08);
  }

  .refresh-btn:active {
    transform: scale(0.92);
  }

  .refresh-btn.spinning {
    animation: spin 0.8s linear infinite;
    pointer-events: none;
  }

  /* Summary Cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .summary-card {
    padding: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    border-radius: 16px 16px 0 0;
  }

  .summary-card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }
  .summary-card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent-emerald), var(--accent-cyan)); }
  .summary-card:nth-child(3)::before { background: linear-gradient(90deg, var(--accent-gold), var(--accent-orange)); }
  .summary-card:nth-child(4)::before { background: linear-gradient(90deg, var(--accent-violet), var(--accent-rose)); }

  .summary-card:hover {
    border-color: var(--border-accent);
    background: var(--bg-card-hover);
    transform: translateY(-3px);
  }

  .summary-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .summary-value {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .summary-sub {
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* Main Grid */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 24px;
  }

  /* Asset Table */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    overflow: hidden;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 28px 16px;
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .card-badge {
    font-size: 11px;
    color: var(--accent-cyan);
    background: rgba(34, 211, 238, 0.08);
    border: 1px solid rgba(34, 211, 238, 0.15);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .asset-table {
    width: 100%;
    border-collapse: collapse;
  }

  .asset-table thead th {
    padding: 12px 28px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: left;
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.01);
  }

  .asset-table thead th:last-child,
  .asset-table tbody td:last-child { text-align: right; }

  .asset-table tbody tr {
    transition: background 0.2s ease;
    cursor: default;
  }

  .asset-table tbody tr:hover {
    background: rgba(99, 179, 237, 0.03);
  }

  .asset-table tbody td {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .asset-name-cell {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .asset-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .asset-name {
    font-weight: 600;
    color: var(--text-primary);
    font-size: 14px;
  }

  .asset-detail {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .mono {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 14px;
  }

  .positive { color: var(--positive); }
  .negative { color: var(--negative); }
  .neutral { color: var(--text-secondary); }

  .return-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
  }

  .return-badge.positive {
    background: rgba(52, 211, 153, 0.1);
    border: 1px solid rgba(52, 211, 153, 0.2);
  }

  .return-badge.negative {
    background: rgba(251, 113, 133, 0.1);
    border: 1px solid rgba(251, 113, 133, 0.2);
  }

  .return-badge.neutral {
    background: rgba(148, 163, 184, 0.1);
    border: 1px solid rgba(148, 163, 184, 0.15);
  }

  /* Sidebar */
  .sidebar { display: flex; flex-direction: column; gap: 24px; }

  /* Donut Chart */
  .donut-wrapper {
    display: flex;
    justify-content: center;
    padding: 24px 0 8px;
  }

  .donut-container {
    position: relative;
    width: 220px;
    height: 220px;
  }

  .donut-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .donut-center-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .donut-center-value {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    margin-top: 4px;
  }

  .legend {
    padding: 0 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-radius: 10px;
    transition: background 0.2s;
  }

  .legend-item:hover {
    background: rgba(255, 255, 255, 0.03);
  }

  .legend-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 4px;
  }

  .legend-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .legend-value {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
  }

  /* Target Card */
  .target-card {
    padding: 28px;
  }

  .target-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .target-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .target-value {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent-gold);
  }

  .progress-track {
    height: 10px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan), var(--accent-emerald));
    transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    border-radius: 0 10px 10px 0;
  }

  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .progress-pct {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: var(--accent-cyan);
  }

  /* Loading */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    text-align: center;
  }

  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--text-muted);
    font-size: 14px;
  }

  /* Stagger animations */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in {
    animation: fadeSlideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }
  .delay-4 { animation-delay: 0.4s; }
  .delay-5 { animation-delay: 0.5s; }
  .delay-6 { animation-delay: 0.6s; }

  /* Error state */
  .data-source-info {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 32px;
    font-family: 'Space Mono', monospace;
  }

  .data-source-info a {
    color: var(--accent-blue);
    text-decoration: none;
  }

  /* Projection Card */
  .projection-section {
    margin-top: 16px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .projection-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .projection-title span {
    font-size: 14px;
  }

  .scenario {
    padding: 12px 14px;
    border-radius: 12px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }

  .scenario:hover {
    border-color: var(--border-accent);
    background: rgba(255,255,255,0.02);
  }

  .scenario-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .scenario-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .scenario-label.conservative { color: var(--accent-blue); }
  .scenario-label.moderate { color: var(--accent-emerald); }
  .scenario-label.optimistic { color: var(--accent-gold); }

  .scenario-year {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .scenario-details {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
  }

  .scenario-bar {
    height: 4px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    margin-top: 8px;
    overflow: hidden;
  }

  .scenario-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .scenario-bar-fill.conservative { background: var(--accent-blue); }
  .scenario-bar-fill.moderate { background: var(--accent-emerald); }
  .scenario-bar-fill.optimistic { background: var(--accent-gold); }

  .projection-note {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 14px;
    line-height: 1.5;
    padding: 8px 10px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  /* Theme Toggle */
  .theme-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(12px);
  }

  .theme-toggle:hover {
    border-color: var(--accent-gold);
    color: var(--accent-gold);
    background: rgba(251, 191, 36, 0.08);
  }

  [data-theme="light"] .noise-overlay { display: none; }
  [data-theme="light"] body::before {
    background: radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(217, 119, 6, 0.04) 0%, transparent 50%);
  }

  /* Growth Timeline Chart */
  .growth-chart-section {
    margin-top: 24px;
  }

  .growth-card {
    padding: 28px;
  }

  .growth-chart-container {
    position: relative;
    width: 100%;
    height: 280px;
    margin-top: 16px;
  }

  .growth-chart-container svg {
    width: 100%;
    height: 100%;
  }

  .chart-grid-line {
    stroke: var(--border);
    stroke-width: 1;
  }

  .chart-axis-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    fill: var(--text-muted);
  }

  .chart-line {
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .chart-dot {
    stroke-width: 2;
    cursor: pointer;
    transition: r 0.2s ease;
  }

  .chart-dot:hover {
    r: 6;
  }

  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .chart-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .chart-legend-item:hover { opacity: 0.7; }

  .chart-legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Error Page */
  .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    text-align: center;
    padding: 40px 20px;
    animation: fadeSlideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .error-icon {
    width: 100px;
    height: 100px;
    border-radius: 28px;

<body>
<div class="noise-overlay"></div>
<div class="app" id="app">
  <div class="loading-state" id="loadingState">
    <div class="loading-spinner"></div>
    <div class="loading-text">Fetching portfolio data from Google Sheets…</div>
  </div>
</div>

<script>
// ============================================
// CONFIGURATION
// ============================================
const SHEET_ID = '1q3nqutHuD_xOunmcutg0berJIGc0-wZuD8jFBpyq0kM';
const GID = '1659295332';

// ============================================
// FETCH DATA (using Google Visualization API with JSONP — bypasses CORS)
// ============================================
function fetchData() {
  return new Promise((resolve, reject) => {
    // Create a unique callback name
    const callbackName = 'gsheetCallback_' + Date.now();
    const timeout = setTimeout(() => {
      delete window[callbackName];
      reject(new Error('Request timed out after 15 seconds. Check your internet connection.'));
    }, 15000);

    // Google Visualization API callback
    window[callbackName] = function(response) {
      clearTimeout(timeout);
      delete window[callbackName];
      try {
        if (response.status === 'error') {
          reject(new Error('Google API error: ' + (response.errors?.[0]?.detailed_message || 'Unknown error')));
          return;
        }
        const table = response.table;
        const numCols = table.cols.length;
        // Convert to array of arrays, preserving exact cell values
        const rows = table.rows.map(row => {
          // Pad row.c to full column count (gviz may truncate trailing nulls)
          const cells = row.c || [];
          const result = [];
          for (let i = 0; i < numCols; i++) {
            const cell = cells[i];
            if (!cell || cell.v === null || cell.v === undefined) {
              result.push('');
            } else {
              result.push(String(cell.v));
            }
          }
          return result;
        });
        console.log('📊 Total rows:', rows.length, 'Columns:', numCols);
        console.log('📊 Row 0 (gold?):', JSON.stringify(rows[0]));
        console.log('📊 Row 1 (silver?):', JSON.stringify(rows[1]));
        console.log('📊 Row 4 (first asset?):', JSON.stringify(rows[4]));
        resolve(parseRows(rows));
      } catch (e) {
        reject(new Error('Failed to parse sheet data: ' + e.message));
      }
    };

    // Inject script tag (JSONP — no CORS issues, works from file:// too)
    const script = document.createElement('script');
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${callbackName}&gid=${GID}`;
    script.onerror = () => {
      clearTimeout(timeout);
      delete window[callbackName];
      reject(new Error('Failed to load Google Sheets script. The sheet may not be shared publicly.'));
    };
    document.body.appendChild(script);
  });
}
function parseRows(lines) {
  const data = {
    goldPrice: 0,
    silverPrice: 0,
    assets: [],
    grandTotal: 0,
    currentValue: 0,
    invested: 0,
    netWorth: 0,
    targetNetWorth: 10000000
  };

  for (const cols of lines) {
    const col0 = String(cols[0] || '').trim();
    // Match gold-price / silver-price exactly as in sheet
    if (col0 === 'gold-price') {
      data.goldPrice = parseNum(cols[1]);
      // If col B is empty, try col I (index 8) as sheet has value there too
      if (!data.goldPrice) data.goldPrice = parseNum(cols[8]);
      console.log('📊 Gold price row:', JSON.stringify(cols.slice(0,10)), '→', data.goldPrice);
    }
    if (col0 === 'silver-price') {
      data.silverPrice = parseNum(cols[1]);
      if (!data.silverPrice) data.silverPrice = parseNum(cols[8]);
      console.log('📊 Silver price row:', JSON.stringify(cols.slice(0,10)), '→', data.silverPrice);
    }
  }

  if (!data.goldPrice || !data.silverPrice) {
    console.log('📊 Price not found! First 3 rows:', JSON.stringify(lines.slice(0, 3).map(r => r.slice(0, 5))));
  }

  // Sheet columns: A=0, B=1(Asset), C=2(Amount), D=3(weight), E=4, F=5(CURRENT-VALUE),
  // G=6(RETURNS-AMOUNT), H=7(RETURNS-%), I=8, J=9(date), K=10, L=11(duration), M=12(month), N=13(avg-invest)
  const assetNames = ['GOLD', 'SILVER', 'GROW-MUTUAL FUNDS', 'COIN-LEQUID-FUND', 'CANARA SAVING ACNT', 'SAVING ACCOUNT(mom)', 'EPF', 'Bike', 'land'];

  for (const cols of lines) {
    const name = (cols[1] || '').trim();
    if (assetNames.includes(name)) {
      console.log('📊 Asset row [' + name + ']:', JSON.stringify(cols));
      data.assets.push({
        name,
        invested: parseNum(cols[2]),
        weight: cols[3] || '',
        currentValue: parseNum(cols[5]),
        returnAmt: parseNum(cols[6]),
        returnPct: cols[7] || '',
        startDate: parseDate(cols[9]),
        duration: cols[11] || '',
        months: parseNum(cols[12]),
        avgInvest: parseNum(cols[13])
      });
    }
    if (name === 'GRAND TOTAL') {
      data.grandTotal = parseNum(cols[2]);
      data.currentValue = parseNum(cols[5]);
    }
    if (name === 'Invest') data.invested = parseNum(cols[2]);
    if (name === 'Net-Worth') data.netWorth = parseNum(cols[5]) || parseNum(cols[2]);
  }

  // Calculate net worth if not found
  if (!data.netWorth) data.netWorth = data.currentValue || data.grandTotal;
  if (!data.currentValue) data.currentValue = data.assets.reduce((s, a) => s + a.currentValue, 0);

  // Log parsed assets for debugging
  console.log('📊 Parsed assets:', data.assets.map(a => a.name + ': months=' + a.months + ', avgInvest=' + a.avgInvest));

  return data;
}

function parseDate(s) {
  if (!s) return '';
  // Handle gviz Date(year,month,day) format — month is 0-indexed
  const m = String(s).match(/Date\((\d+),(\d+),(\d+)\)/);
  if (m) {
    const d = new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]));
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }
  // Already readable text like "28-March-2025"
  return s;
}

function parseNum(s) {
  if (!s) return 0;
  const n = parseFloat(String(s).replace(/,/g, '').replace(/#ERROR!/g, '0'));
  return isNaN(n) ? 0 : n;
}

// ============================================
// PARSE CSV DATA
// ============================================

// ============================================
// RENDER
// ============================================
function fmt(n) {
  if (n >= 10000000) return '₹' + (n / 10000000).toFixed(2) + ' Cr';
  if (n >= 100000) return '₹' + (n / 100000).toFixed(2) + ' L';
  return '₹' + n.toLocaleString('en-IN');
}

function fmtFull(n) {
  return '₹' + n.toLocaleString('en-IN');
}

const assetMeta = {
  'GOLD': { icon: '🥇', color: 'var(--accent-gold)', bg: 'rgba(251,191,36,0.1)', border: 'rgba(251,191,36,0.2)' },
  'SILVER': { icon: '🥈', color: '#94a3b8', bg: 'rgba(148,163,184,0.1)', border: 'rgba(148,163,184,0.2)' },
  'GROW-MUTUAL FUNDS': { icon: '📈', color: 'var(--accent-emerald)', bg: 'rgba(52,211,153,0.1)', border: 'rgba(52,211,153,0.2)' },
  'COIN-LEQUID-FUND': { icon: '💧', color: 'var(--accent-blue)', bg: 'rgba(99,179,237,0.1)', border: 'rgba(99,179,237,0.2)' },
  'CANARA SAVING ACNT': { icon: '🏦', color: 'var(--accent-violet)', bg: 'rgba(167,139,250,0.1)', border: 'rgba(167,139,250,0.2)' },
  'SAVING ACCOUNT(mom)': { icon: '💜', color: 'var(--accent-rose)', bg: 'rgba(251,113,133,0.1)', border: 'rgba(251,113,133,0.2)' },
  'EPF': { icon: '🛡️', color: 'var(--accent-cyan)', bg: 'rgba(34,211,238,0.1)', border: 'rgba(34,211,238,0.2)' },
  'Bike': { icon: '🏍️', color: 'var(--accent-orange)', bg: 'rgba(251,146,60,0.1)', border: 'rgba(251,146,60,0.2)' },
  'land': { icon: '🏡', color: 'var(--accent-gold)', bg: 'rgba(251,191,36,0.1)', border: 'rgba(251,191,36,0.2)' }
};

// Color palette pool — wide variety, no two look similar
const colorPool = [
  '#fbbf24','#34d399','#63b3ed','#a78bfa','#fb7185','#22d3ee','#fb923c',
  '#f472b6','#4ade80','#60a5fa','#c084fc','#f87171','#2dd4bf','#facc15',
  '#e879f9','#38bdf8','#a3e635','#ff6b6b','#4ecdc4','#ffe66d','#a855f7',
  '#06b6d4','#f59e0b','#ec4899','#10b981','#6366f1','#ef4444','#14b8a6',
  '#8b5cf6','#f97316','#0ea5e9','#84cc16','#d946ef','#eab308','#3b82f6'
];

// Shuffle and pick unique colors on every load
function getShuffledColors(count) {
  const pool = [...colorPool];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, count);
}

// Generate fresh colors for this session
const donutColors = getShuffledColors(12);

function buildDonut(assets, totalValue) {
  const filtered = assets.filter(a => a.currentValue > 0);
  let cumulative = 0;
  const radius = 85, cx = 110, cy = 110, strokeWidth = 28;
  const circumference = 2 * Math.PI * radius;
  let paths = '';

  filtered.forEach((a, i) => {
    const pct = ((a.currentValue / totalValue) * 100).toFixed(1);
    const dashLen = (a.currentValue / totalValue) * circumference;
    const dashOff = -cumulative * circumference;
    paths += `<circle class="donut-seg" data-index="${i}" data-name="${a.name}" data-value="${fmt(a.currentValue)}" data-pct="${pct}%" cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="${donutColors[i % donutColors.length]}" stroke-width="${strokeWidth}" stroke-dasharray="${dashLen} ${circumference - dashLen}" stroke-dashoffset="${dashOff}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})" style="opacity:0;animation:donutIn 0.8s ${0.15*i}s forwards ease-out;cursor:pointer;transition:stroke-width 0.25s ease, filter 0.25s ease;"/>`;
    cumulative += a.currentValue / totalValue;
  });

  return `<svg width="220" height="220" viewBox="0 0 220 220">
    <style>
      @keyframes donutIn{from{opacity:0;stroke-dasharray:0 ${circumference}}to{opacity:1}}
      .donut-seg:hover{stroke-width:34;filter:brightness(1.3) drop-shadow(0 0 8px currentColor);}
    </style>
    ${paths}
  </svg>`;
}

function getReturnClass(pct) {
  if (!pct) return 'neutral';
  const n = parseFloat(pct);
  if (n > 0) return 'positive';
  if (n < 0) return 'negative';
  return 'neutral';
}

function getReturnArrow(pct) {
  if (!pct) return '—';
  const n = parseFloat(pct);
  if (n > 0) return '↑';
  if (n < 0) return '↓';
  return '—';
}

function render(data, source) {
  const app = document.getElementById('app');
  const now = new Date();
  const timeStr = now.toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

  const totalReturn = data.currentValue - data.invested;
  const totalReturnPct = data.invested > 0 ? ((totalReturn / data.invested) * 100).toFixed(1) : 0;
  const progressPct = Math.min((data.netWorth / data.targetNetWorth) * 100, 100).toFixed(1);

  const activeAssetNames = ['GOLD', 'SILVER', 'GROW-MUTUAL FUNDS', 'COIN-LEQUID-FUND'];
  const investAssets = data.assets.filter(a => activeAssetNames.includes(a.name));
  const otherAssets = data.assets.filter(a => !activeAssetNames.includes(a.name));
  const totalCV = data.currentValue || data.assets.reduce((s,a) => s + a.currentValue, 0);

  // Active investment returns (from sheet's RETRUNS-AMOUNT column)
  const activeReturns = investAssets.reduce((s, a) => s + a.returnAmt, 0);
  const activeInvested = investAssets.reduce((s, a) => s + a.invested, 0);
  const activeReturnPct = activeInvested > 0 ? ((activeReturns / activeInvested) * 100).toFixed(1) : 0;

  // Total investment = active invested + other assets invested
  const otherInvested = otherAssets.reduce((s, a) => s + a.invested, 0);
  const totalInvestment = activeInvested + otherInvested;

  // Overall returns = total current value - total investment
  const overallReturns = totalCV - totalInvestment;
  const overallReturnPct = totalInvestment > 0 ? ((overallReturns / totalInvestment) * 100).toFixed(1) : 0;

  const legendItems = data.assets.filter(a => a.currentValue > 0).map((a, i) => {
    const pct = ((a.currentValue / totalCV) * 100).toFixed(1);
    return `
    <div class="legend-item">
      <div class="legend-left">
        <div class="legend-dot" style="background:${donutColors[i % donutColors.length]}"></div>
        <span class="legend-name">${a.name}</span>
      </div>
      <div style="text-align:right">
        <span class="legend-value">${fmt(a.currentValue)}</span>
        <div style="font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace;margin-top:2px">${pct}%</div>
      </div>
    </div>
  `}).join('');

  app.innerHTML = `
    <!-- Header -->
    <header class="header animate-in">
      <div class="header-left">
        <div class="logo-mark">P</div>
        <div>
          <div class="page-title">Portfolio</div>
          <div class="page-subtitle">Personal Asset Dashboard</div>
        </div>
      </div>
      <div class="header-right">
        <div class="price-chip">
          <span class="price-chip-icon">🥇</span>
          <span class="price-chip-label">Gold</span>
          <span class="price-chip-value">${fmtFull(data.goldPrice)}/g</span>
        </div>
        <div class="price-chip">
          <span class="price-chip-icon">🥈</span>
          <span class="price-chip-label">Silver</span>
          <span class="price-chip-value">${fmtFull(data.silverPrice)}/g</span>
        </div>
        <div class="live-badge"><div class="live-dot"></div>Live</div>
        <button class="refresh-btn" onclick="refreshData(this)" title="Refresh data">↻</button>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">🌙</button>
        <div class="last-updated">${timeStr}</div>
      </div>
    </header>

    <!-- Summary Cards -->
    <div class="summary-grid animate-in delay-2">
      <div class="summary-card">
        <div class="summary-label">Net Worth</div>
        <div class="summary-value">${fmt(data.netWorth)}</div>
        <div class="summary-sub">Total current value</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Total Investment</div>
        <div class="summary-value">${fmt(totalInvestment)}</div>
        <div class="summary-sub">Active (${fmt(activeInvested)}) + Other (${fmt(otherInvested)})</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Active Returns</div>
        <div class="summary-value ${activeReturns >= 0 ? 'positive' : 'negative'}">${activeReturns >= 0 ? '+' : ''}${fmt(Math.abs(activeReturns))}</div>
        <div class="summary-sub ${activeReturns >= 0 ? 'positive' : 'negative'}">${activeReturns >= 0 ? '↑' : '↓'} ${activeReturnPct}% on active investments</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Overall Returns</div>
        <div class="summary-value ${overallReturns >= 0 ? 'positive' : 'negative'}">${overallReturns >= 0 ? '+' : ''}${fmt(Math.abs(overallReturns))}</div>
        <div class="summary-sub ${overallReturns >= 0 ? 'positive' : 'negative'}">${overallReturns >= 0 ? '↑' : '↓'} ${overallReturnPct}% on all assets</div>
      </div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">
      <!-- Left: Asset Table -->
      <div>
        <!-- Active Investments -->
        <div class="card animate-in delay-3" style="margin-bottom:24px">
          <div class="card-header">
            <div class="card-title">Active Investments</div>

            // Projection calculation
            const target = 100000000; // 1 Cr in paise... no, 1Cr = 10000000
            const targetVal = 10000000;
            const currentNW = data.netWorth || totalCV;
            const gap = targetVal - currentNW;
            if (gap <= 0) return '<div class="projection-section"><div class="projection-title"><span>🎉</span> Target reached!</div></div>';

            // Monthly SIP from Gold + MF (active growth assets)
            const goldSIP = data.assets.find(a => a.name === 'GOLD')?.avgInvest || 23389;
            const mfSIP = data.assets.find(a => a.name === 'GROW-MUTUAL FUNDS')?.avgInvest || 29424;
            const monthlySIP = goldSIP + mfSIP;

            // Project future value: FV = PV*(1+r)^n + SIP*[((1+r)^n - 1)/r]
            function projectMonths(annualReturn) {
              const r = annualReturn / 12;
              for (let m = 1; m <= 240; m++) {
                const fv = currentNW * Math.pow(1 + r, m) + monthlySIP * ((Math.pow(1 + r, m) - 1) / r);
                if (fv >= targetVal) return m;
              }
              return 240;
            }

            const scenarios = [
              { label: 'Conservative', cls: 'conservative', rate: 0.10, months: projectMonths(0.10) },
              { label: 'Moderate', cls: 'moderate', rate: 0.13, months: projectMonths(0.13) },
              { label: 'Optimistic', cls: 'optimistic', rate: 0.16, months: projectMonths(0.16) },
            ];

            const maxMonths = Math.max(...scenarios.map(s => s.months));
            const now = new Date();

            function getTargetDate(months) {
              const d = new Date(now);
              d.setMonth(d.getMonth() + months);
              return d.toLocaleDateString('en-IN', { month: 'short', year: 'numeric' });
            }

            function getYears(months) {
              const y = Math.floor(months / 12);
              const m = months % 12;
              if (y === 0) return m + ' months';
              if (m === 0) return y + ' yrs';
              return y + 'y ' + m + 'm';
            }

            return '<div class="projection-section">' +
              '<div class="projection-title"><span>🔮</span> Projection to ₹1 Cr</div>' +
              '<div style="font-size:11px;color:var(--text-muted);margin-bottom:14px;font-family:Space Mono,monospace">SIP: ' + fmtFull(Math.round(monthlySIP)) + '/mo (Gold + MF)</div>' +
              scenarios.map(s => {
                const barPct = ((maxMonths - s.months) / maxMonths * 40 + 60).toFixed(0);
                return '<div class="scenario">' +
                  '<div class="scenario-header">' +
                    '<span class="scenario-label ' + s.cls + '">' + s.label + '</span>' +
                    '<span class="scenario-year">' + getTargetDate(s.months) + '</span>' +
                  '</div>' +
                  '<div class="scenario-details">' +
                    '<span>' + (s.rate * 100).toFixed(0) + '% CAGR</span>' +
                    '<span>' + getYears(s.months) + '</span>' +
                  '</div>' +
                  '<div class="scenario-bar"><div class="scenario-bar-fill ' + s.cls + '" style="width:' + barPct + '%"></div></div>' +
                '</div>';
              }).join('') +
              '<div class="projection-note">⚠ Simplified projection using compound growth. Actual returns vary with market conditions. Not financial advice.</div>' +
            '</div>';
          })()}
        </div>

        <!-- Investment Stats -->
        <div class="card animate-in delay-6" style="padding:24px 28px">
          <div class="card-title" style="margin-bottom:20px">Investment Stats</div>
          ${investAssets.map(a => {

              <span style="font-size:13px;color:var(--text-secondary)">${a.name}</span>

// ============================================
// GROWTH TIMELINE CHART
// ============================================
function buildGrowthChart(data) {
  const container = document.getElementById('growthChart');
  const legendEl = document.getElementById('chartLegend');
  if (!container) return;

  const activeAssets = data.assets.filter(a => 
    ['GOLD', 'SILVER', 'GROW-MUTUAL FUNDS', 'COIN-LEQUID-FUND'].includes(a.name) && a.months > 0
  );

  if (activeAssets.length === 0) {
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px">No growth data available</div>';
    return;
  }

  const chartColors = ['#fbbf24', '#94a3b8', '#34d399', '#63b3ed'];
  const W = 800, H = 260, padL = 65, padR = 20, padT = 20, padB = 40;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  // Find max months and max value for scaling
  const maxMonths = Math.max(...activeAssets.map(a => a.months));
  const maxVal = Math.max(...activeAssets.map(a => Math.max(a.currentValue, a.invested)));

  // Generate simulated monthly growth points for each asset
  // Using linear invested growth and compound return curve
  function getPoints(asset) {
    const points = [];
    const monthlyInvest = asset.invested / (asset.months || 1);
    const totalReturn = asset.currentValue - asset.invested;
    
    for (let m = 0; m <= asset.months; m++) {
      const investedAtM = monthlyInvest * m;
      // Growth curve: slight exponential
      const progress = m / (asset.months || 1);
      const returnAtM = totalReturn * Math.pow(progress, 1.3);
      const value = investedAtM + returnAtM;
      points.push({ month: m, value: Math.max(0, value) });
    }
    return points;
  }

  // Y-axis scale
  const yMax = Math.ceil(maxVal / 100000) * 100000;
  const ySteps = 5;
  const yStep = yMax / ySteps;

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Grid lines and Y labels
  for (let i = 0; i <= ySteps; i++) {
    const y = padT + plotH - (i / ySteps) * plotH;
    const val = yStep * i;
    svg += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" class="chart-grid-line" stroke-dasharray="${i === 0 ? '0' : '4,4'}"/>`;
    const label = val >= 100000 ? (val / 100000).toFixed(val >= 1000000 ? 0 : 1) + 'L' : (val / 1000).toFixed(0) + 'K';
    svg += `<text x="${padL - 8}" y="${y + 4}" text-anchor="end" class="chart-axis-label">₹${label}</text>`;
  }

  // X-axis labels
  const xStepCount = Math.min(maxMonths, 6);
  const xStep = Math.ceil(maxMonths / xStepCount);
  for (let m = 0; m <= maxMonths; m += xStep) {
    const x = padL + (m / maxMonths) * plotW;
    svg += `<text x="${x}" y="${H - 8}" text-anchor="middle" class="chart-axis-label">${m}mo</text>`;
  }

  // Draw lines for each asset
  activeAssets.forEach((asset, ai) => {
    const points = getPoints(asset);
    const color = chartColors[ai % chartColors.length];

    // Area fill
    let areaPath = `M ${padL + (points[0].month / maxMonths) * plotW} ${padT + plotH}`;
    points.forEach(p => {
      const x = padL + (p.month / maxMonths) * plotW;
      const y = padT + plotH - (p.value / yMax) * plotH;
      areaPath += ` L ${x} ${y}`;
    });
    areaPath += ` L ${padL + (points[points.length - 1].month / maxMonths) * plotW} ${padT + plotH} Z`;
    svg += `<path d="${areaPath}" fill="${color}" opacity="0.06"/>`;

    // Line
    let linePath = '';
    points.forEach((p, pi) => {
      const x = padL + (p.month / maxMonths) * plotW;
      const y = padT + plotH - (p.value / yMax) * plotH;
      linePath += (pi === 0 ? 'M ' : ' L ') + x + ' ' + y;
    });
    svg += `<path d="${linePath}" class="chart-line" stroke="${color}"/>`;

    // End dot
    const last = points[points.length - 1];
    const lx = padL + (last.month / maxMonths) * plotW;
    const ly = padT + plotH - (last.value / yMax) * plotH;
    svg += `<circle cx="${lx}" cy="${ly}" r="4" fill="${color}" stroke="var(--bg-primary)" class="chart-dot"/>`;

    // End value label
    const labelVal = last.value >= 100000 ? '₹' + (last.value / 100000).toFixed(1) + 'L' : '₹' + (last.value / 1000).toFixed(0) + 'K';
    svg += `<text x="${lx}" y="${ly - 10}" text-anchor="middle" fill="${color}" font-family="Space Mono,monospace" font-size="10" font-weight="700">${labelVal}</text>`;
  });

  svg += '</svg>';
  container.innerHTML = svg;

  // Legend
  legendEl.innerHTML = activeAssets.map((a, i) => {
    const returnStr = a.returnAmt >= 0 ? '+' + fmtFull(a.returnAmt) : fmtFull(a.returnAmt);
    return `<div class="chart-legend-item">
      <div class="chart-legend-dot" style="background:${chartColors[i % chartColors.length]}"></div>
      <span>${a.name}</span>
      <span style="font-family:'Space Mono',monospace;font-weight:700;color:${a.returnAmt >= 0 ? 'var(--positive)' : 'var(--negative)'}">${returnStr}</span>
    </div>`;
  }).join('');
}

// ============================================
// DONUT INTERACTIVITY (hover + tap)
// ============================================
function setupDonutInteractivity(data) {
  const totalCV = data.currentValue || data.assets.reduce((s, a) => s + a.currentValue, 0);
  const segments = document.querySelectorAll('.donut-seg');
  const centerLabel = document.querySelector('.donut-center-label');
  const centerValue = document.querySelector('.donut-center-value');
  const legendItems = document.querySelectorAll('.legend-item');
  let activeIndex = -1; // Track which segment is "selected" (for tap)

  function highlightSegment(idx) {
    const seg = segments[idx];
    if (!seg) return;
    // Update center text
    centerLabel.textContent = seg.dataset.name;
    centerLabel.style.color = donutColors[idx % donutColors.length];
    centerValue.innerHTML = `${seg.dataset.value}<div style="font-size:13px;color:${donutColors[idx % donutColors.length]};margin-top:2px;font-weight:800">${seg.dataset.pct}</div>`;
    // Dim other segments
    segments.forEach((s, i) => {
      s.style.opacity = i === idx ? '1' : '0.25';
      s.style.strokeWidth = i === idx ? '34' : '28';
      s.style.filter = i === idx ? 'brightness(1.3) drop-shadow(0 0 8px currentColor)' : '';
    });
    // Highlight matching legend item
    legendItems.forEach((li, i) => {
      if (i === idx) {
        li.style.background = 'rgba(255,255,255,0.06)';
        li.style.borderRadius = '10px';
        li.style.transform = 'scale(1.03)';
        li.style.transition = 'all 0.25s ease';
      } else {
        li.style.opacity = '0.35';
        li.style.transition = 'all 0.25s ease';
      }
    });
  }

  function resetAll() {
    activeIndex = -1;
    centerLabel.textContent = 'Total';
    centerLabel.style.color = '';
    centerValue.textContent = fmt(totalCV);
    segments.forEach(s => {
      s.style.opacity = '';
      s.style.strokeWidth = '';
      s.style.filter = '';
    });
    legendItems.forEach(li => {
      li.style.background = '';
      li.style.transform = '';
      li.style.opacity = '';
    });
  }

  // Desktop: hover
  segments.forEach(seg => {
    seg.addEventListener('mouseenter', () => {
      highlightSegment(parseInt(seg.dataset.index));
    });
    seg.addEventListener('mouseleave', () => {
      if (activeIndex === -1) resetAll();
      else highlightSegment(activeIndex);
    });
  });

  // Mobile + Desktop: click/tap on segments
  segments.forEach(seg => {
    seg.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(seg.dataset.index);
      if (activeIndex === idx) {
        resetAll(); // Tap again to deselect
      } else {
        activeIndex = idx;
        highlightSegment(idx);
      }
    });
  });

  // Legend: hover + click
  legendItems.forEach((li, idx) => {
    li.addEventListener('mouseenter', () => highlightSegment(idx));
    li.addEventListener('mouseleave', () => {
      if (activeIndex === -1) resetAll();
      else highlightSegment(activeIndex);
    });
    li.addEventListener('click', (e) => {
      e.stopPropagation();
      if (activeIndex === idx) {
        resetAll();
      } else {
        activeIndex = idx;
        highlightSegment(idx);
      }
    });
  });

  // Tap anywhere else to deselect
  document.addEventListener('click', () => {
    if (activeIndex !== -1) resetAll();
  });
}

// ============================================
// REFRESH
// ============================================
async function refreshData(btn) {
  if (btn) {
    btn.classList.add('spinning');
    btn.disabled = true;
  }
  try {
    const data = await fetchData();
    render(data, 'live');
    setupDonutInteractivity(data);
    buildGrowthChart(data);
    // Restore theme
    const themeBtn = document.getElementById('themeBtn');
    try {
      if (localStorage.getItem('portfolio-theme') === 'light') {
        if (themeBtn) themeBtn.textContent = '☀️';
      }
    } catch(e) {}
  } catch (e) {
    console.error('Refresh failed:', e);
    renderError(e.message);
  }
  if (btn) {
    btn.classList.remove('spinning');
    btn.disabled = false;
  }
}
